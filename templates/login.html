<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
            background-color: #121212;
        }

        .form-signin {
            max-width: 380px;
            padding: 1rem;
        }

        .form-signin .form-floating:focus-within {
            z-index: 2;
        }

        .form-signin input[type="text"] {
            margin-bottom: -1px;
            border-bottom-right-radius: 0;
            border-bottom-left-radius: 0;
        }

        .form-signin input[type="password"] {
            margin-bottom: 10px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }

        .login-card {
            background-color: #1c1c1c;
            border: 1px solid #2f2f2f;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        .brand-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            border: 1px solid #333;
        }
    </style>
</head>
<body class="text-center">

<main class="form-signin w-100 m-auto">
    <div class="login-card p-4">
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="brand-circle">F</div>
            <h1 class="h3 mb-3 fw-normal">Sign in</h1>
            <p class="text-secondary mb-4">Ingresa con tu usuario y contraseña</p>

            {% if form.errors %}
                <div class="alert alert-danger py-2" role="alert">
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <div class="form-floating">
                <input type="text"
                       class="form-control"
                       id="floatingInput"
                       placeholder="Usuario"
                       name="username"
                       required>
                <label for="floatingInput">Usuario</label>
            </div>

            <div class="form-floating">
                <input type="password"
                       class="form-control"
                       id="floatingPassword"
                       placeholder="Contraseña"
                       name="password"
                       required>
                <label for="floatingPassword">Contraseña</label>
            </div>

            <div class="form-check text-start my-3">
                <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
                <label class="form-check-label" for="checkDefault">
                    Recordarme
                </label>
            </div>

            <button class="btn btn-dark w-100 py-2 border" type="submit">Sign in</button>
            <p class="mt-3 mb-2">
                <a href="{% url 'password_reset' %}" class="text-decoration-none">
                    ¿Olvidaste tu contraseña?
                </a>
            </p>
            <p class="mt-4 mb-2 text-body-secondary">
                ¿No tienes cuenta?
                <a href="{% url 'register' %}" class="text-decoration-none">Regístrate aquí</a>
            </p>

            <p class="mt-3 mb-0 text-body-secondary">&copy; 2026</p>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
