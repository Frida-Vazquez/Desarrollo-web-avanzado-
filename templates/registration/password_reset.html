<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
            background-color: #121212;
        }

        .form-reset {
            max-width: 420px;
            padding: 1rem;
        }

        .reset-card {
            background-color: #1c1c1c;
            border: 1px solid #2f2f2f;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        .brand-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
            border: 1px solid #333;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 0.75rem;
            margin-bottom: 0.35rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #495057;
            background-color: #212529;
            color: white;
        }

        .errorlist {
            color: #ff6b6b;
            text-align: left;
            font-size: 0.9rem;
            list-style: none;
            padding-left: 0;
        }
    </style>
</head>
<body class="text-center">

<main class="form-reset w-100 m-auto">
    <div class="reset-card p-4">
        <form method="post">
            {% csrf_token %}

            <div class="brand-circle">F</div>
            <h2 class="mb-3">Recuperar contraseña</h2>
            <p class="text-secondary mb-4">
                Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
            </p>

            {{ form.as_p }}

            <button class="btn btn-dark w-100 py-2 border mt-3" type="submit">
                Enviar enlace
            </button>

            <p class="mt-4 mb-0 text-body-secondary">
                <a href="{% url 'login' %}" class="text-decoration-none">Volver al inicio de sesión</a>
            </p>
        </form>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
