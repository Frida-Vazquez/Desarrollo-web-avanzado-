<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }

        body {
            display: flex;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 40px;
            background-color: #121212;
            color: white;
        }

        .form-reset {
            max-width: 460px;
            padding: 1rem;
        }

        .reset-card {
            background-color: #1c1c1c;
            border: 1px solid #2f2f2f;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }

        label {
            display: block;
            text-align: left;
            margin-top: 0.75rem;
            margin-bottom: 0.35rem;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #495057;
            background-color: #212529;
            color: white;
        }

        .helptext {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            color: #adb5bd;
            margin-top: 0.25rem;
            margin-bottom: 0.5rem;
        }

        .errorlist {
            color: #ff6b6b;
            text-align: left;
            font-size: 0.9rem;
            list-style: none;
            padding-left: 0;
        }
    </style>
</head>
<body class="text-center">

<main class="form-reset w-100 m-auto">
    <div class="reset-card p-4">
        {% if validlink %}
            <h2 class="mb-3">Establece tu nueva contraseña</h2>
            <p class="text-secondary mb-4">Escribe tu nueva contraseña dos veces.</p>

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <button class="btn btn-dark w-100 py-2 border mt-3" type="submit">
                    Cambiar contraseña
                </button>
            </form>
        {% else %}
            <h2 class="mb-3">Enlace inválido</h2>
            <p class="text-secondary">
                Este enlace ya fue usado o expiró.
            </p>
            <a href="{% url 'password_reset' %}" class="btn btn-dark border mt-3">
                Solicitar otro enlace
            </a>
        {% endif %}
    </div>
</main>

</body>
</html>
