<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo enviado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-custom {
            max-width: 500px;
            margin: auto;
            background-color: #1c1c1c;
            border: 1px solid #2f2f2f;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.35);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card-custom p-4 text-center">
            <h2 class="mb-3">Revisa tu correo</h2>
            <p class="text-secondary">
                Si el correo que ingresaste existe en el sistema, te enviamos instrucciones para restablecer tu contraseña.
            </p>
            <a href="{% url 'login' %}" class="btn btn-dark border mt-3">Volver al login</a>
        </div>
    </div>
</body>
</html>
